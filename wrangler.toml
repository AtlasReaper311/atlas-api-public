# atlas-api-public :: the versioned public surface of the estate.
name = "atlas-api-public"
main = "src/index.js"
compatibility_date = "2026-06-01"
account_id = "49e221b7e55a9e5c45b88d08efca5771"

routes = [
  { pattern = "api.atlas-systems.uk/v1*", zone_id = "8ba6350a78c988447c111048b125f917" }
]

[triggers]
crons = ["*/10 * * * *"]

[vars]
CORPUS_ORIGIN = "https://corpus.atlas-systems.uk"
STALE_AFTER_SECONDS = "1200"
UPTIME_WINDOW_DAYS = "30"

[[kv_namespaces]]
binding = "ATLAS_PUBLIC_KV"
id = "33fa7cbf66fc495ea0304a5f95ffc9a8"

[[services]]
binding = "ATLAS_NOTIFY"
service = "atlas-notify"

[[services]]
binding = "REGISTRY"
service = "atlas-api-index"

[[services]]
binding = "GITHUB_PULSE"
service = "github-pulse"

[[services]]
binding = "SPECULAR_EDGE"
service = "specular-edge"

[[services]]
binding = "SITE_PULSE"
service = "site-pulse"

[[services]]
binding = "DEPLOY_WATCH"
service = "deploy-watch"

[[services]]
binding = "RAMONE_TRIGGER"
service = "ramone-trigger"

[[services]]
binding = "ATLAS_BLACKBOX"
service = "atlas-blackbox"

[[services]]
binding = "ATLAS_QUOTA_WATCH"
service = "atlas-quota-watch"

[[services]]
binding = "RAMONE_EDGE"
service = "ramone-edge"

[[unsafe.bindings]]
name = "RL_GENERAL"
type = "ratelimit"
namespace_id = "1101"
simple = { limit = 60, period = 60 }

[[unsafe.bindings]]
name = "RL_SEARCH"
type = "ratelimit"
namespace_id = "1102"
simple = { limit = 10, period = 60 }

# Secrets, set only through interactive `wrangler secret put` prompts:
#   INFRA_REPORT_KEY
#   RAG_REPORT_KEY
#   EVIDENCE_REPORT_KEY
#   NOTIFY_TOKEN
