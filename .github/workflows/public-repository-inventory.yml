name: Public repository inventory

on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: public-repository-inventory
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh public repository inventory
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/sync_public_repositories.mjs

      - name: Validate generated topology
        run: |
          npm run lint
          npm test

      - name: Open or refresh inventory pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- data/public-repositories.json
          then
            echo "Inventory is already current."
            exit 0
          fi

          branch="automation/public-repository-inventory"

          git config user.name "atlas-estate-bot"
          git config user.email "atlas@atlas-systems.uk"
          git switch -C "$branch"
          git add data/public-repositories.json
          git commit -m "Refresh public repository inventory"
          git push --force-with-lease origin "$branch"

          existing="$(
            gh pr list \
              --head "$branch" \
              --base main \
              --state open \
              --json url \
              --jq '.[0].url // empty'
          )"

          if [ -z "$existing" ]
          then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "Refresh public repository inventory" \
              --body "Automated refresh of public, non-archived AtlasReaper311 repositories consumed by /v1/topology."
          else
            echo "Updated existing pull request: $existing"
          fi
