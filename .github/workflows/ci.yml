name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (node --test)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run Trace unit tests
        run: node --test test/trace.test.js
      - name: Run tests
        run: |
          set +e
          npm test > /tmp/atlas-api-public-tests.log 2>&1
          TEST_STATUS=$?
          cat /tmp/atlas-api-public-tests.log
          exit "$TEST_STATUS"
      - name: Upload failing unit-test output
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: atlas-api-public-test-output
          path: /tmp/atlas-api-public-tests.log
          retention-days: 1
      - name: Build exact Wrangler deployment candidate
        run: npx wrangler deploy --dry-run --outdir dist
      - name: Check out pinned Atlas Infra Worker contract validator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          ref: f971172dc258c93dffa53b8b7a3532c5be55883d
          path: .atlas-infra-contracts
          persist-credentials: false
      - name: Validate bundled Worker contracts
        run: |
          python3 .atlas-infra-contracts/scripts/worker_contract.py check \
            --bundle-dir dist \
            --require-meta \
            --require-openapi
      - name: Check out Atlas Infra classification authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          ref: main
          path: .classification-authority
          sparse-checkout: policy/public-repository-classifications.json
          sparse-checkout-cone-mode: false
      - name: Verify repository classification projection
        run: |
          node scripts/verify-repository-classifications.mjs \
            data/public-repository-classifications.json \
            .classification-authority/policy/public-repository-classifications.json
      - name: Check out exact Atlas Infra ADR Trace authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          ref: 8ce372fe7c97e2cd17b16ed72550c3507ab0e751
          path: .trace-authority
          persist-credentials: false
      - name: Verify ADR runtime projection
        run: |
          python3 .trace-authority/scripts/adr_trace.py emit \
            --root .trace-authority \
            --output /tmp/adr-runtime-index.json
          node scripts/verify-adr-runtime-index.mjs \
            data/adr-runtime-index.json \
            /tmp/adr-runtime-index.json

  # CI result reported through the reusable atlas-notify workflow:
  # routes to #ci-cd via signal_class, failures mirror to #alerts.
  notify:
    needs: test
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: AtlasReaper311/atlas-notify/.github/workflows/notify.yml@4485013d9a432d4759ce025fa9bc73aa6a2d9c7f # atlas-notify main: channel routing
    with:
      status: ${{ needs.test.result }}
      kind: ci
      signal_class: cicd
    secrets:
      NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
