name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm test

  notify:
    name: Report to Discord
    needs: test
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Notify success
        if: needs.test.result == 'success'
        env:
          DISCORD_CICD_WEBHOOK: ${{ secrets.DISCORD_CICD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_CICD_WEBHOOK" ]; then
            echo "DISCORD_CICD_WEBHOOK is not set; skipping Discord notification."
            exit 0
          fi
          curl --fail -X POST "$DISCORD_CICD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "username": "ci-cd",
              "embeds": [{
                "title": "CI passed: atlas-api-public",
                "description": "eslint plus the 28-test smoke suite passed on push to main.",
                "color": 4906624,
                "fields": [
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Actor", "value": "${{ github.actor }}", "inline": true}
                ],
                "footer": {"text": "Atlas Systems — Pipeline"}
              }]
            }'
      - name: Notify failure
        if: needs.test.result == 'failure'
        env:
          DISCORD_CICD_WEBHOOK: ${{ secrets.DISCORD_CICD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_CICD_WEBHOOK" ]; then
            echo "DISCORD_CICD_WEBHOOK is not set; skipping Discord notification."
            exit 0
          fi
          curl --fail -X POST "$DISCORD_CICD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "username": "ci-cd",
              "embeds": [{
                "title": "CI failed: atlas-api-public",
                "description": "eslint or the smoke suite failed on push to main.",
                "color": 14830410,
                "fields": [
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Actor", "value": "${{ github.actor }}", "inline": true}
                ],
                "footer": {"text": "Atlas Systems — Pipeline"}
              }]
            }'
