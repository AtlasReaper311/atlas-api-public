name: Public interface preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/interface-preview.yml"
      - ".github/workflows/ci.yml"
      - "assets/docs-icons/**"
      - "assets/docs-interface/**"
      - "docs/PHASE-D-PUBLIC-API-DOCS-INTERFACE-V2.md"
      - "package.json"
      - "package-lock.json"
      - "scripts/capture-docs-interface-evidence.mjs"
      - "scripts/embed-docs-icons.mjs"
      - "scripts/embed-docs-interface.mjs"
      - "scripts/verify-docs-interface.mjs"
      - "src/index.js"
      - "src/routes/docs-icons.generated.js"
      - "src/routes/docs-interface.generated.js"
      - "src/routes/docs-shell.js"
      - "src/routes/docs.js"
      - "test/docs-interface.test.js"
      - "wrangler.interface-preview.toml"
      - "wrangler.toml"

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-public-interface-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Public API docs preview candidate
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact pull request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deterministic local interface assets
        run: |
          set -euo pipefail
          npm run verify:docs-interface
          npm run build:docs-interface
          npm run build:docs-icons
          git diff --exit-code -- \
            src/routes/docs-interface.generated.js \
            src/routes/docs-icons.generated.js

      - name: Validate API, privacy, OpenAPI, Trace, and docs contracts
        run: |
          set -euo pipefail
          npm run lint
          node scripts/project-public-topology-evidence.mjs \
            --write \
            evidence/topology/2026-07-22T102913Z.json \
            data/estate.manifest.json \
            data/public-repository-classifications.json \
            /tmp/public-topology-evidence.json
          diff -u data/public-topology-evidence.json /tmp/public-topology-evidence.json
          npm test
          node --check scripts/capture-docs-interface-evidence.mjs
          npx wrangler deploy --dry-run --outdir "$RUNNER_TEMP/wrangler-dry-run"
          npx wrangler deploy \
            --config wrangler.interface-preview.toml \
            --dry-run \
            --outdir "$RUNNER_TEMP/interface-preview-dry-run"
          git diff --check

      - name: Check bundled Worker contracts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          ref: f971172dc258c93dffa53b8b7a3532c5be55883d
          path: .atlas-infra-contracts
          persist-credentials: false

      - name: Validate exact production-shaped Wrangler bundle
        run: |
          set -euo pipefail
          python3 .atlas-infra-contracts/scripts/worker_contract.py check \
            --bundle-dir "$RUNNER_TEMP/wrangler-dry-run" \
            --require-meta \
            --require-openapi

  deploy-preview:
    name: Publish isolated Public API docs preview
    needs: validate
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: public-interface-preview
      url: ${{ steps.deploy.outputs.preview_url }}
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKERS_DEPLOY_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      PREVIEW_WORKER: atlas-api-docs-interface-pr-${{ github.event.pull_request.number }}
      SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Check out exact pull request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard production boundary
        run: |
          set -euo pipefail
          test "${{ github.event.pull_request.base.ref }}" = "main"
          test "${SOURCE_BRANCH}" != "main"
          test "${SOURCE_BRANCH}" != "production"
          test "${PREVIEW_WORKER}" = "atlas-api-docs-interface-pr-${{ github.event.pull_request.number }}"
          grep -q '^workers_dev = true$' wrangler.interface-preview.toml
          grep -q '^preview_urls = false$' wrangler.interface-preview.toml
          ! grep -Eq '^(route|routes|\[\[routes\]\]|\[triggers\]|\[\[services\]\]|\[\[kv_namespaces\]\]|\[\[unsafe\.bindings\]\])' wrangler.interface-preview.toml

      - name: Publish isolated workers.dev preview
        id: deploy
        run: |
          set -euo pipefail
          output_file="${RUNNER_TEMP}/wrangler-preview-deploy.log"
          npx wrangler deploy \
            --config wrangler.interface-preview.toml \
            --name "${PREVIEW_WORKER}" \
            2>&1 | tee "${output_file}"
          preview_url="$(grep -Eo 'https://[A-Za-z0-9._-]+\.workers\.dev' "${output_file}" | tail -n 1)"
          test -n "${preview_url}"
          echo "preview_url=${preview_url}" >> "${GITHUB_OUTPUT}"

      - name: Attach exact preview to the pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        run: |
          set -euo pipefail
          marker="<!-- atlas-public-api-docs-interface-preview -->"
          body="${marker}
          ## Live Public API docs interface preview

          - Human docs preview: ${PREVIEW_URL}/v1/docs
          - Isolated Worker root: ${PREVIEW_URL}
          - Commit: \`${{ github.event.pull_request.head.sha }}\`
          - Production: unchanged

          This isolated workers.dev Worker has no production routes, service bindings, KV bindings, rate-limit bindings, or schedules. Browser and accessibility evidence is captured from this exact deployment."
          existing_id="$(gh api "/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" --paginate --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | head -n 1)"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "/repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" -f body="${body}"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "${body}"
          fi

  capture-evidence:
    name: Capture deterministic Public API docs evidence
    needs: deploy-preview
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview_url }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out exact evidence runner
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: scripts/capture-docs-interface-evidence.mjs
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: "22"

      - name: Install pinned browser and accessibility tooling
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/api-docs-interface-evidence"
          cp scripts/capture-docs-interface-evidence.mjs "${RUNNER_TEMP}/api-docs-interface-evidence/"
          cd "${RUNNER_TEMP}/api-docs-interface-evidence"
          npm init -y >/dev/null
          npm install --save-exact playwright@1.61.1 @axe-core/playwright@4.12.1
          npm audit --audit-level=high
          npx playwright install --with-deps firefox

      - name: Capture governed browser and viewport matrix
        working-directory: ${{ runner.temp }}/api-docs-interface-evidence
        run: node capture-docs-interface-evidence.mjs

      - name: Upload visual and accessibility evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-api-docs-interface-preview-evidence
          path: |
            ${{ runner.temp }}/api-docs-interface-evidence/evidence.json
            ${{ runner.temp }}/api-docs-interface-evidence/capture-error.txt
            ${{ runner.temp }}/api-docs-interface-evidence/screenshots/*.png
          if-no-files-found: error
          retention-days: 14
